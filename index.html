<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link href="./css/style.css" rel="stylesheet" />

    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css"
    />

    <link rel="stylesheet" type="text/css" href="./css/media.css" />
    <title>Alliatus</title>
  </head>
  <body class="body">
    <header class="header pt-80 pb-50 position-fixed w-100 bg-white">
      <nav class="navbar navbar-expand-xl navbar-light p-0">
        <div class="container">
          <a class="navbar-brand" href="#">
            <img src="./images/alliatus-logo.svg" alt="Header logo" />
          </a>
          <button
            class="navbar-toggler collapsed"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNavAltMarkup"
            aria-controls="navbarNavAltMarkup"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div
            class="burger-menu collapse navbar-collapse justify-content-end pt-4 pb-5 pt-xl-0 pb-xl-0"
            id="navbarNavAltMarkup"
          >
            <div class="border-menu navbar-nav align-items-center">
              <a
                class="nav-link font-20 text-dark-grey me-50 p-0 mb-3 mb-xl-0"
                href="#"
                >Home</a
              >
              <a
                class="nav-link font-20 text-dark-grey me-50 p-0 mb-3 mb-xl-0"
                href="#"
                >About</a
              >
              <a
                class="nav-link font-20 text-dark-grey me-50 p-0 mb-3 mb-xl-0"
                href="#"
                >How it works</a
              >
              <a
                class="nav-link font-20 text-dark-grey me-50 p-0 mb-3 mb-xl-0"
                href="#"
                >Member stories</a
              >
              <a
                class="nav-link font-20 text-dark-grey me-50 p-0 mb-3 mb-xl-0"
                href="#"
                >Events</a
              >
              <a
                class="nav-link font-20 text-dark-grey px-5 py-3 border-dark-brown br-12"
                href="#"
                >Log in</a
              >
            </div>
          </div>
        </div>
      </nav>
    </header>

    <div class="overlay"></div>

    <div class="main"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>

    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
      integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
      crossorigin="anonymous"
    ></script>

    <script src="./js/script.js"></script>
  </body>
</html>
